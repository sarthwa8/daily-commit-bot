name: Daily commits

on:
  schedule:
    # 06:17 UTC daily. An odd minute avoids the top-of-hour congestion when
    # GitHub delays/drops scheduled runs. Adjust to your timezone if you like.
    - cron: "17 6 * * *"
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

# Required so the workflow's GITHUB_TOKEN can push commits back to the repo.
permissions:
  contents: write

# If a run is somehow still going when the next fires, let it finish.
concurrency:
  group: daily-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make a few commits
        env:
          # Authoring commits with YOUR account email is what makes them count
          # toward the contribution graph.
          GIT_AUTHOR_NAME: sarthwa8
          GIT_AUTHOR_EMAIL: sarthakvs10@gmail.com
          GIT_COMMITTER_NAME: sarthwa8
          GIT_COMMITTER_EMAIL: sarthakvs10@gmail.com
        run: |
          set -euo pipefail
          chmod +x scripts/log-activity.sh

          # A random number of commits between 2 and 5.
          n=$(( (RANDOM % 4) + 2 ))
          echo "Making $n commit(s)."

          for i in $(seq 1 "$n"); do
            scripts/log-activity.sh "$i" "$n"
            git add -A
            git commit -m "chore: daily activity $(date -u +'%Y-%m-%d') ($i/$n)"
          done

          git push
