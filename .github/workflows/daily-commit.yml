name: Daily commits

on:
  schedule:
    # Two odd-minute times (UTC). GitHub frequently runs scheduled jobs hours
    # late or skips them under load, so the second cron is a safety net. The
    # per-day guard in the run step ensures we still commit only one batch a day.
    - cron: "17 6 * * *"
    - cron: "17 13 * * *"
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

# Required so the workflow's GITHUB_TOKEN can push commits back to the repo.
permissions:
  contents: write

# If a run is somehow still going when the next fires, let it finish.
concurrency:
  group: daily-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make a few commits
        env:
          # Authoring commits with YOUR account email is what makes them count
          # toward the contribution graph.
          GIT_AUTHOR_NAME: sarthwa8
          GIT_AUTHOR_EMAIL: sarthakvs10@gmail.com
          GIT_COMMITTER_NAME: sarthwa8
          GIT_COMMITTER_EMAIL: sarthakvs10@gmail.com
        run: |
          set -euo pipefail
          chmod +x scripts/log-activity.sh

          today="$(date -u +'%Y-%m-%d')"

          # Per-day guard: if today's batch already landed (an earlier, delayed,
          # or duplicate run beat us to it), do nothing. Keeps it to one batch/day
          # even with two cron times plus manual runs.
          if git log --grep="daily activity ${today}" --oneline | grep -q .; then
            echo "Already committed for ${today}; nothing to do."
            exit 0
          fi

          # A random number of commits between 6 and 10.
          n=$(( (RANDOM % 5) + 6 ))
          echo "Making $n commit(s) for ${today}."

          for i in $(seq 1 "$n"); do
            scripts/log-activity.sh "$i" "$n"
            git add -A
            git commit -m "chore: daily activity ${today} ($i/$n)"
          done

          git push
